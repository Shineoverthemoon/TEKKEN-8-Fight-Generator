<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tekken 8 — Fight Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--blue:#0077FF;--red:#FF2222;--gold:#FFD700;--dark:#060810;--panel:#0A0C18;--card:#0F1220;--border:#181C30;--text:#DCE8FF;--dim:#404870;}
body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 14px 72px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 55% 30% at 15% 5%,rgba(0,119,255,0.08) 0%,transparent 65%),radial-gradient(ellipse 45% 25% at 85% 85%,rgba(255,34,34,0.06) 0%,transparent 65%);pointer-events:none;z-index:0;}
.header{text-align:center;position:relative;z-index:1;margin-bottom:6px;}
.title{font-family:'Orbitron',sans-serif;font-size:clamp(2rem,8vw,4rem);font-weight:900;letter-spacing:0.1em;color:var(--text);text-shadow:0 0 30px rgba(0,119,255,0.4);}
.title span{color:var(--blue);}
.subtitle{font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--dim);margin-top:5px;}
.patch-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,119,255,0.1);border:1px solid rgba(0,119,255,0.3);border-radius:20px;padding:4px 12px;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:#6699FF;margin-top:8px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px 18px;width:100%;max-width:800px;position:relative;z-index:1;margin-top:22px;}
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.pill{font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;padding:5px 11px;border-radius:20px;border:1px solid var(--border);background:#080A14;color:var(--dim);cursor:pointer;transition:all 0.12s;}
.pill:hover{border-color:var(--blue);color:var(--text);}
.pill.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.pill.dlc.active{background:#9B30FF;border-color:#9B30FF;}
.search-wrap{position:relative;margin-bottom:12px;}
.hero-search{width:100%;background:#080A14;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.85rem;padding:9px 14px 9px 36px;outline:none;transition:border-color 0.15s;}
.hero-search:focus{border-color:var(--blue);}
.hero-search::placeholder{color:var(--dim);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:0.85rem;pointer-events:none;}
.btn-wrap{display:flex;justify-content:center;margin-top:4px;}
.btn-gen{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.1em;background:linear-gradient(135deg,#0055CC,#0077FF);color:#fff;border:none;border-radius:8px;padding:13px 36px;cursor:pointer;transition:transform 0.12s,box-shadow 0.15s;}
.btn-gen:hover{transform:scale(1.04);box-shadow:0 0 22px rgba(0,119,255,0.4);}
.btn-gen:active{transform:scale(0.97);}
#result{display:none;flex-direction:column;gap:14px;margin-top:20px;}
.fight-row{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center;}
.fighter-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;}
.fp-owner{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dim);}
.fp-name{font-family:'Orbitron',sans-serif;font-size:clamp(0.9rem,3vw,1.3rem);font-weight:700;color:var(--text);line-height:1.2;}
.fp-style{font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;padding:3px 8px;border-radius:10px;background:rgba(0,119,255,0.12);color:#88AAFF;}
.fp-badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:2px;}
.badge{font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;padding:1px 5px;border-radius:4px;font-weight:600;}
.badge.dlc{background:rgba(155,48,255,0.2);color:#B060FF;}
.badge.new{background:rgba(255,215,0,0.2);color:var(--gold);}
.badge.beginner{background:rgba(100,200,100,0.15);color:#88DD88;}
.badge.mishima{background:rgba(255,34,34,0.15);color:#FF8888;}
.badge.guest{background:rgba(255,140,0,0.15);color:#FFAA44;}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,0.4);}
.scenario-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:10px;padding:16px 14px;}
.scenario-label{font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;font-weight:600;}
.scenario-text{font-size:0.86rem;line-height:1.65;color:#8898CC;}
.cursor{display:inline-block;width:2px;height:0.85em;background:var(--blue);margin-left:2px;vertical-align:text-bottom;animation:blink 0.7s steps(1) infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── TTS button ── */
.tts-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:20px;padding:6px 14px;cursor:pointer;
  font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
  color:#AAA;transition:all 0.15s;margin-top:10px;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.tts-btn:hover{background:rgba(255,255,255,0.1);color:#FFF;border-color:rgba(255,255,255,0.25);}
.tts-btn.playing{color:#FFD700;border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.08);}
.tts-btn.loading{opacity:0.6;cursor:wait;}
</style>
</head>
<body>
<div class="header">
  <div class="title">TEKKEN <span>8</span></div>
  <div class="subtitle">Fight Generator — Joe vs CPU</div>
  <div class="patch-badge">🟢 Season 3 · June 2026 · 41 Characters</div>
</div>
<div class="card">
  <div class="filter-row">
    <div class="pill active" data-filter="all">All</div>
    <div class="pill" data-filter="mishima">Mishima</div>
    <div class="pill" data-filter="williams">Williams/Manji</div>
    <div class="pill" data-filter="beginner">Beginner</div>
    <div class="pill dlc" data-filter="dlc">DLC</div>
    <div class="pill dlc" data-filter="guest">Guest</div>
  </div>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="hero-search" id="heroSearch" type="text" placeholder="Search fighters..." oninput="buildGrid()" autocomplete="off"></div>
  <div class="btn-wrap">
    <button class="btn-gen" id="genBtn">⚡ GENERATE FIGHT</button>
  </div>
  <div id="result">
    <div class="fight-row">
      <div class="fighter-panel">
        <div class="fp-owner">Joe plays</div>
        <div class="fp-name" id="nameJoe">—</div>
        <div class="fp-style" id="styleJoe"></div>
        <div class="fp-badges" id="badgesJoe"></div>
      </div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="fighter-panel">
        <div class="fp-owner">CPU plays</div>
        <div class="fp-name" id="nameCpu">—</div>
        <div class="fp-style" id="styleCpu"></div>
        <div class="fp-badges" id="badgesCpu"></div>
      </div>
    </div>
    <div class="scenario-box">
      <div class="scenario-label">🥊 Match Breakdown</div>
      <div class="scenario-text" id="scenarioText"></div>
      <button class="tts-btn" id="ttsBtn" style="display:none" onclick="(function(b){const t=document.getElementById(\'scenarioText\');speakScenario(b,t.innerText);})(this)">🔊 Read Aloud</button>
    </div>
  </div>
</div>
<script>
const ALL = [
  // Base roster 32
  {n:"Jin Kazama",        style:"Karate / Devil",           tags:["mishima"]},
  {n:"Kazuya Mishima",    style:"Mishima Karate",           tags:["mishima"]},
  {n:"Paul Phoenix",      style:"Judo / Karate",            tags:["beginner"]},
  {n:"Marshall Law",      style:"Martial Arts",             tags:["beginner"]},
  {n:"King",              style:"Pro Wrestling",            tags:["beginner"]},
  {n:"Nina Williams",     style:"Assassination Arts",       tags:[]},
  {n:"Jack-8",            style:"Brute Force",              tags:["beginner"]},
  {n:"Lars Alexandersson",style:"Tekken Forces Style",      tags:["beginner"]},
  {n:"Xiaoyu",            style:"Phoenix / Panda Style",    tags:[]},
  {n:"Asuka Kazama",      style:"Kazama Style Jujutsu",     tags:[]},
  {n:"Leroy Smith",       style:"Wing Chun",                tags:[]},
  {n:"Claudio",           style:"Sirius Style",             tags:[]},
  {n:"Hwoarang",          style:"Taekwondo",                tags:[]},
  {n:"Steve Fox",         style:"Boxing",                   tags:[]},
  {n:"Jun Kazama",        style:"Kazama Style Jujutsu",     tags:["mishima"]},
  {n:"Reina",             style:"Mishima Style / Taido",    tags:["mishima"]},
  {n:"Victor Chevalier",  style:"French Martial Arts",      tags:[]},
  {n:"Lili",              style:"Street Fighting",          tags:[]},
  {n:"Shaheen",           style:"Saudi Military Martial Arts",tags:[]},
  {n:"Kuma",              style:"Heihachi Style Bear Fighting",tags:[]},
  {n:"Panda",             style:"Heihachi Style Bear Fighting",tags:[]},
  {n:"Leo",               style:"Bajiquan",                 tags:[]},
  {n:"Lee Chaolan",       style:"Martial Arts",             tags:[]},
  {n:"Bryan Fury",        style:"Kickboxing / Snake Fighting",tags:[]},
  {n:"Dragunov",          style:"Sambo",                    tags:[]},
  {n:"Feng Wei",          style:"Chinese Martial Arts",     tags:[]},
  {n:"Yoshimitsu",        style:"Manji Ninjutsu",           tags:["williams"]},
  {n:"Raven",             style:"Ninjutsu",                 tags:[]},
  {n:"Zafina",            style:"Ancient Assassination Arts",tags:[]},
  {n:"Devil Jin",         style:"Mishima Karate / Devil",   tags:["mishima"]},
  {n:"Azucena",           style:"Libre Fighting",           tags:[]},
  {n:"Alisa",             style:"Mechanical Fighting Arts", tags:[]},
  // Season 1 DLC
  {n:"Eddy Gordo",        style:"Capoeira",                 tags:["dlc"]},
  {n:"Lidia Sobieska",    style:"Polish Karate",            tags:["dlc"]},
  {n:"Heihachi Mishima",  style:"Mishima Karate",           tags:["dlc","mishima"]},
  {n:"Clive Rosfield",    style:"Royal Arms",               tags:["dlc","guest"]},
  // Season 2 DLC
  {n:"Anna Williams",     style:"Assassination Arts",       tags:["dlc","williams"]},
  {n:"Fahkumram",         style:"Muay Thai",                tags:["dlc"]},
  {n:"Armor King",        style:"Pro Wrestling",            tags:["dlc"]},
  {n:"Miary Zo",          style:"Morengy / Dambe",          tags:["dlc"]},
  // Season 3 DLC
  {n:"Kunimitsu",         style:"Manji Ninjutsu / Tantojutsu",tags:["dlc","new","williams"]},
];

const SCENARIOS = [
  "Iron First Tournament finals — two fighters who've been on a collision course the whole bracket. Both have beaten opponents who should have stopped them. The King of Iron Fist only cares about who walks out.",
  "The Mishima Zaibatsu's shadow reaches everywhere, but this fight has nothing to do with them. Two fighters with their own reasons, their own grudges, their own unfinished business. The arena just happens to be where they ended up.",
  "One fighter has been studying footage of the other for weeks. The other one doesn't even know who they are. Film study means nothing when the first exchange shatters the gameplan.",
  "Heat system is the great equalizer — one well-timed Heat Smash can turn a losing round into a dominant one. Both fighters know it. Both are waiting for the opening. The first one to commit and miss is going to regret it.",
  "The Tekken Force issued a bounty. Both fighters are here to collect it. The problem is the bounty is on each other. Someone gave both of them the same contract. First one to figure it out wins by default. Until then — fight.",
  "A rematch that's been coming since their last tournament bracket. The result was controversial then. Someone wants to prove it wasn't a fluke. The other one wants to prove it wasn't luck.",
  "Devil Gene readings are off the charts in this sector. Neither fighter is the source. Something is using their conflict to feed. The longer this fight goes, the stronger it gets.",
  "Kazuya's satellite weapon fired. It missed. The electromagnetic pulse from the near-miss knocked both fighters into a shielded arena and locked the exits. The only thing working in this arena is their fists.",
  "The G Corporation and Mishima Zaibatsu have been at war for years. Two fighters caught in the crossfire have been deposited in the same neutral zone with no alliance, no extraction, and no reason to be friendly.",
  "The King of Iron Fist bracket was manipulated. Someone with access to the seeding algorithm made sure these two ended up in the same slot. The bracket results can't be reversed. The match is mandatory.",
  "Heihachi used this arena for unofficial fights long before the tournament was formalized. The walls remember every fight that happened inside them. The floor has absorbed enough blood to qualify as a combat relic. Both fighters can feel it.",
  "Reina's Taido style intersects with Mishima Karate in ways that even she doesn't fully understand yet. The fighter across from her isn't going to give her time to analyze the intersection academically.",
  "The law of the fist is simple — the stronger fighter wins. This arena doesn't care about motives, alliances, or history. It only registers the outcome. Two fighters. One outcome.",
  "Victor Chevalier's intelligence network flagged this location as a site for an undisclosed meeting between two fighters with opposed agendas. Victor is the one who arranged the meeting. He's watching from two streets away through surveillance equipment older than either fighter.",
  "Both fighters are legacy warriors — descendants or students of legends in this tournament's history. The history between their mentors is unresolved. Tonight it gets resolved through them whether they want it to or not.",
  "The electric floor of the Mishima dojo is active. Every time a fighter is knocked down, the current activates. Both {A} and {B} have been knocked down before and survived it. Tonight the current feels stronger than it has before.",
  "Yoshimitsu's Manji clan intel indicated this fighter was a liability. The contract was accepted before anyone confirmed who the target actually was. The target is someone Yoshimitsu has complicated feelings about. The contract, however, is clear.",
  "Bryan Fury doesn't fight for causes. He doesn't fight for money. He fights because the perpetual generator in his chest produces energy that requires an outlet, and the cleanest outlet is someone willing to fight back. Whoever is across from him tonight meets that criteria.",
  "Dragunov received orders. The orders were followed. He arrived at the designated location. The person he was sent to meet is not here. The person who is here is not on any list he was given. The orders did not specify what to do in this scenario. He's defaulting to standard combat assessment protocol.",
  "The Underground Fighting Circuit doesn't have rules about who can enter. It does have rules about who can leave. Both fighters entered tonight. The exit protocol requires one fighter to be carrying the other.",
  "Leo came looking for answers about their father's death. The trail led here. The fighter at the end of the trail is either responsible, a witness, or completely uninvolved. The only way to find out is to fight them until they talk or can't.",
  "Lili challenged someone to a fight because she was bored. She has never been bored with the consequences of that decision because she has never lost a fight she initiated out of boredom. Tonight feels different.",
  "Steve Fox boxes because boxing is what he knows. Everything else — the conspiracy, the Mishima bloodline, the origin questions — is noise. The fighter across from him is not noise. The fighter across from him is the first thing in months that requires his full attention.",
  "The G Corporation's biometric combat data project requires footage of high-level fights between specific fighting style types. Both fighters were recruited separately, told it was an exhibition match, and not told about each other. The footage starts when the arena doors close.",
  "Feng Wei's quest to master all fighting styles has led him to this arena. The fighter across from him has a style Feng Wei has studied but never faced at this level. The study is about to become practical.",
  "Armor King doesn't speak. He doesn't explain himself. He entered the arena, identified his opponent, and is waiting for the bell. The fighter across from him has been trying to figure out what this fight is about for twenty minutes. Armor King is going to stop waiting.",
  "Fahkumram's Muay Thai is among the most powerful striking arts on earth. The fighter across from him is either going to learn that firsthand or they already know and have been preparing for exactly this kind of pressure.",
  "Kunimitsu's Tantojutsu combines Manji ninjutsu with blade work in ways that make standard defensive theory unreliable. The fighter across from her knows standard defensive theory very well. This is going to be an education.",
  "The tournament's seeding committee published the bracket three days early. Both fighters saw each other's name in the bracket three days ago. Both fighters have been preparing for this specific fight for three days. Neither preparation looks exactly like what the other fighter expected.",
  "Anna Williams and Nina Williams share a bloodline and a history of mutual attempted assassination that spans decades. Tonight is not a Williams vs Williams fight. Tonight is a fight that one of the Williams sisters arranged because the outcome benefits her. The other fighter doesn't know which sister, or why, or what the benefit is.",
];

let activeFilter='all';
document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');activeFilter=p.dataset.filter;});});
function getPool(){
  const q=document.getElementById('heroSearch').value.toLowerCase().trim();
  return ALL.filter(h=>{
    if(q&&!h.n.toLowerCase().includes(q)) return false;
    if(activeFilter==='all') return true;
    return h.tags.includes(activeFilter);
  });
}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function typewrite(el,text,speed=16){el.innerHTML='';let i=0;const cur=document.createElement('span');cur.className='cursor';el.appendChild(cur);const tick=()=>{if(i<text.length){el.insertBefore(document.createTextNode(text[i++]),cur);setTimeout(tick,speed);}else{cur.remove();}};tick();}
function renderFighter(f, nameId, styleId, badgesId){
  document.getElementById(nameId).textContent=f.n;
  document.getElementById(styleId).textContent=f.style;
  document.getElementById(badgesId).innerHTML=f.tags.map(t=>`<span class="badge ${t}">${t}</span>`).join('');
}
document.getElementById('genBtn').addEventListener('click',()=>{
  const pool=getPool();
  if(pool.length<2){alert('Not enough fighters. Try All.');return;}
  const s=shuffle(pool);
  const f1=s[0],f2=s.find(c=>c.n!==f1.n);
  if(!f2){alert('Need at least 2.');return;}
  const [joe,cpu]=Math.random()<0.5?[f1,f2]:[f2,f1];
  renderFighter(joe,'nameJoe','styleJoe','badgesJoe');
  renderFighter(cpu,'nameCpu','styleCpu','badgesCpu');
  document.getElementById('result').style.display='flex';
  document.getElementById('ttsBtn').style.display='inline-flex';
  typewrite(document.getElementById('scenarioText'),SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)]);
});
document.getElementById('heroSearch').addEventListener('input',()=>{});
</script>

<script>
// ── TTS (OpenAI Nova via proxy) ───────────────────────────
const TTS_URL = 'https://tts-proxy-i1sn.onrender.com';
let ttsAudio = null;

async function speakScenario(btn, text) {
  // iOS audio unlock MUST happen synchronously before any await
  if (!ttsAudio) {
    ttsAudio = new Audio();
    ttsAudio.play().catch(()=>{});
    ttsAudio.pause();
  }

  // stop if already playing
  if (ttsAudio && !ttsAudio.paused) {
    ttsAudio.pause();
    ttsAudio.currentTime = 0;
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('playing');
    return;
  }

  // get the actual rendered text from the DOM right now
  const el = document.getElementById('scenarioText');
  const actualText = (el ? (el.innerText || el.textContent) : text).trim();

  if (!actualText || actualText.length < 5) {
    btn.textContent = '⏳ Still generating...';
    setTimeout(() => { btn.textContent = '🔊 Read Aloud'; }, 1500);
    return;
  }

  btn.textContent = '⏳ Loading...';
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const r = await fetch(TTS_URL + '/tts', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text: actualText})
    });
    if (!r.ok) throw new Error('Server error ' + r.status);
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    ttsAudio.src = TTS_URL + data.path;
    ttsAudio.onended = () => {
      btn.textContent = '🔊 Read Aloud';
      btn.classList.remove('playing');
    };
    await ttsAudio.play();
    btn.textContent = '⏹ Stop';
    btn.classList.remove('loading');
    btn.classList.add('playing');
  } catch(e) {
    console.error('TTS error:', e);
    btn.textContent = '🔊 Read Aloud';
    btn.classList.remove('loading','playing');
    alert('TTS error: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
